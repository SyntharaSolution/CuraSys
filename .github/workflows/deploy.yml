name: Deploy to VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: '8.3'
        extensions: mbstring, xml, ctype, iconv, intl, pdo_mysql, bcmath
        coverage: none

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install NPM Dependencies & Build Assets
      run: |
        npm install
        npm run build

    - name: Sync files to VPS
      uses: appleboy/scp-action@v0.1.7
      with:
        host: ${{ secrets.VPS_HOST }}
        port: ${{ secrets.VPS_PORT }}
        username: ${{ secrets.VPS_USERNAME }}
        password: ${{ secrets.VPS_PASSWORD }}
        source: "*,!node_modules,!vendor,!.git,!.env,!tests,!storage/logs/*,!storage/framework/cache/*,!storage/framework/views/*,!storage/framework/sessions/*,!bootstrap/cache/*.php"
        target: "/var/www/curasys"

    - name: Execute Deployment Commands via SSH
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.VPS_HOST }}
        port: ${{ secrets.VPS_PORT }}
        username: ${{ secrets.VPS_USERNAME }}
        password: ${{ secrets.VPS_PASSWORD }}
        script: |
          # Clean up any other projects to keep only curasys and html
          cd /var/www
          for d in */; do
            if [ "$d" != "curasys/" ] && [ "$d" != "html/" ]; then
              echo '${{ secrets.VPS_PASSWORD }}' | sudo -S rm -rf "$d"
            fi
          done
          
          cd /var/www/curasys
          
          # Remove synced vendor to ensure clean install (if any synced incorrectly)
          rm -rf vendor
          
          # Delete old cache files that were incorrectly synced before
          rm -f bootstrap/cache/*.php
          
          # Install PHP dependencies
          composer install -q --no-ansi --no-interaction --no-scripts --no-progress --prefer-dist --optimize-autoloader
          
          # Run Laravel Commands
          php artisan optimize:clear
          php artisan config:cache
          php artisan route:cache
          php artisan view:cache
          php artisan migrate --force
          
          # Ensure correct permissions
          echo '${{ secrets.VPS_PASSWORD }}' | sudo -S chown -R administrator:www-data /var/www/curasys
          echo '${{ secrets.VPS_PASSWORD }}' | sudo -S chmod -R 775 /var/www/curasys/storage /var/www/curasys/bootstrap/cache
